name: ci

# COST: `push:` used to fire on EVERY branch, so each feature commit ran the full
# matrix — including macos-latest, billed at 10x Linux — and the PR then ran it AGAIN.
# Now push is main-only (feature work is gated by its PR), macOS runs only where it
# earns its 10x (PRs + manual dispatch), and concurrency cancels superseded runs.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege: this CI only reads the repo. Pin the token to read-only so a
# compromised step can't push, open PRs, or alter the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # Both OSes on purpose: two shipped bugs (SOPS key location, bash-3.2 empty array
    # under set -u) were macOS-only and invisible to Linux-only CI. But macOS is 10x the
    # cost, so run it only where it gates a merge (PR) or on demand — Linux always runs
    # (incl. push to main). A direct push to main gets Linux; use a PR or dispatch for macOS.
    strategy:
      fail-fast: false
      matrix:
        os: ${{ (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') && fromJSON('["ubuntu-latest", "macos-latest"]') || fromJSON('["ubuntu-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Bash syntax
        run: |
          for f in plugins/mcp-secure/bin/mcp-secret \
                   plugins/mcp-secure/bin/mcp-launch \
                   plugins/mcp-secure/bin/mcp-bundles \
                   install.sh; do
            bash -n "$f"
          done

      - name: shellcheck
        if: runner.os == 'Linux'
        # warning severity: info-level notes (e.g. SC2015 on the intentional
        # `check && check || die` idiom) vary by shellcheck version and are
        # style, not defects; they shouldn't fail CI.
        run: |
          shellcheck --severity=warning \
                     plugins/mcp-secure/bin/mcp-secret \
                     plugins/mcp-secure/bin/mcp-launch \
                     plugins/mcp-secure/bin/mcp-bundles \
                     install.sh

      - name: Python syntax
        run: |
          for f in plugins/mcp-secure/hooks/mcp-guard.py \
                   plugins/mcp-secure/hooks/mcp-nudge.py \
                   plugins/mcp-secure/hooks/mcp-call-guard.py \
                   plugins/mcp-secure/bin/mcp-doctor \
                   plugins/mcp-secure/bin/mcp-pin; do
            python -c "import sys; compile(open(sys.argv[1]).read(), sys.argv[1], 'exec')" "$f"
          done

      - name: JSON valid
        run: |
          for f in .claude-plugin/marketplace.json \
                   plugins/*/.claude-plugin/plugin.json \
                   plugins/mcp-secure/hooks/hooks.json \
                   plugins/mcp-secure/bundles/*.json \
                   plugins/mcp-secure/templates/globals-profile/.mcp.json \
                   plugins/mcp-secure/templates/globals-profile/.claude-plugin/plugin.json; do
            python -c "import json,sys; json.load(open(sys.argv[1]))" "$f"
          done

      - name: Tests
        run: |
          for t in plugins/mcp-secure/hooks/tests/test_*.py \
                   plugins/mcp-secure/tests/test_*.py; do
            echo "== $t"
            python "$t"
          done

  # Separate job: the harness's own linter for plugin + marketplace manifests.
  # The CLI is npm-pinned so this job can't drift under us silently.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Claude Code (pinned)
        run: npm install -g @anthropic-ai/claude-code@2.1.207
      - name: Validate manifests (strict)
        run: |
          claude plugin validate . --strict
          claude plugin validate plugins/mcp-secure --strict
